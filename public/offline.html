<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOTH - Offline</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 2rem;
        }
        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 2rem;
            border: 3px solid #dc2626;
        }
        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
        }
        p {
            color: #9ca3af;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .retry-btn {
            background: linear-gradient(to right, #dc2626, #b91c1c);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-weight: 900;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        .retry-btn:hover {
            background: linear-gradient(to right, #b91c1c, #991b1b);
            transform: translateY(-2px);
        }
        .status {
            margin-top: 1rem;
            font-size: 0.875rem;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://i.ibb.co/CsWLCpgH/Chat-GPT-Image-Jun-25-2025-12-44-10-PM.png" alt="BOOTH Logo" class="logo">
        <h1>BOOTH</h1>
        <p>You're currently offline. BOOTH requires an internet connection to access the elite founder platform.</p>
        <button class="retry-btn" onclick="window.location.reload()">
            Retry Connection
        </button>
        <div class="status" id="status">
            Checking connection...
        </div>
    </div>

    <script>
        function updateStatus() {
            const status = document.getElementById('status');
            if (navigator.onLine) {
                status.textContent = 'Connection restored! Click retry to continue.';
                status.style.color = '#10b981';
            } else {
                status.textContent = 'Still offline. Please check your connection.';
                status.style.color = '#ef4444';
            }
        }

        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);
        
        // Initial status check
        setTimeout(updateStatus, 1000);
    </script>
</body>
</html>
